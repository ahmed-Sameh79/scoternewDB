kind = "web"
previewPath = "/admin/"
title = "Motorcycle ERP & POS"
version = "1.0.0"
id = "artifacts/moto-erp"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/admin/" ]
localPort = 23231

[services.development]
run = "pnpm --filter @workspace/moto-erp run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/moto-erp", "run", "build" ]
publicDir = "artifacts/moto-erp/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23231"
BASE_PATH = "/admin/"
