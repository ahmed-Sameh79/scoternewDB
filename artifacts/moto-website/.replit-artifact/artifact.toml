kind = "web"
previewPath = "/"
title = "Motorcycle Parts - Official Website"
version = "1.0.0"
id = "artifacts/moto-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26117

[services.development]
run = "pnpm --filter @workspace/moto-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/moto-website", "run", "build" ]
publicDir = "artifacts/moto-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26117"
BASE_PATH = "/"
