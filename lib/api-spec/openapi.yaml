                items:
                  $ref: "#/components/schemas/WorkOrder"

  /analytics/top-parts:
    get:
      operationId: getTopParts
      tags: [analytics]
      summary: Get top-selling parts
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Top parts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopPartItem"

components:
  schemas:
    HealthStatus:
