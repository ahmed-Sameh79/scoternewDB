    # ─── ENUMS ───────────────────────────────────────────────────────────────
    UserRole:
      type: string
      enum: [admin, storekeeper, technician, sales]

    PartCondition:
      type: string
      enum: [new, used]

    MotorcycleStatus:
      type: string
      enum: [available, sold, in_service, pre_owned]

    POStatus:
      type: string
      enum: [draft, ordered, partially_received, received, cancelled]

